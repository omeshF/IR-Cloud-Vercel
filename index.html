<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QA — IR Lab (Vercel - Serverless Demo)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--surface:#111;--border:#222;--border2:#2a2a2a;
  --text:#e0e0e0;--muted:#6b7280;--green:#4ade80;--red:#f87171;
  --yellow:#facc15;--blue:#60a5fa;--accent:#1d4ed8;
}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#hud{position:fixed;top:0;left:0;right:0;height:54px;background:#0a0a0a;
  border-bottom:1px solid var(--border);display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;z-index:200}
#clock{font-size:26px;font-weight:700;font-family:monospace;color:var(--green)}
#pbar{position:fixed;top:54px;left:0;height:3px;background:var(--green);transition:width 1s linear;z-index:200}
.hud-label{font-size:11px;color:var(--muted);text-transform:uppercase}
.hud-btns{display:flex;gap:8px}
.wrap{max-width:1000px;margin:0 auto;padding:74px 20px 40px}
.card{background:var(--surface);border:1px solid #2a2a2a;border-radius:8px;margin-bottom:16px}
.card-head{padding:11px 18px;background:#161616;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center}
.card-head h3{font-size:13px;font-weight:500;color:var(--muted)}
.card-body{padding:18px}
input, button{width:100%;margin-bottom:10px;padding:8px;border-radius:6px}
input{background:#0a0a0a;border:1px solid #333;color:var(--text);font-family:monospace}
.btn{background:#1d4ed8;color:#fff;border:none;cursor:pointer;font-weight:500}
.btn-danger{background:#7f1d1d}
.btn-ghost{background:#333;color:#fff}
.btn-sm{padding:5px 12px;width:auto;margin-bottom:0}
.rbox{background:#0a0a0a;border:1px solid #333;border-radius:6px;padding:11px;margin-top:10px;
  font-family:monospace;font-size:11px;white-space:pre-wrap;display:none;max-height:400px;overflow-y:auto}
.rbox.err{color:var(--red)}
.rbox.info{color:var(--blue)}
.hint{font-size:12px;color:var(--muted);margin-top:6px}
.row{display:flex;gap:8px;align-items:center}
.row button{width:auto}
.log-viewer{background:#0a0a0a;border:1px solid #333;border-radius:6px;padding:12px;margin-top:15px;max-height:400px;overflow-y:auto}
.log-entry{font-family:monospace;font-size:10px;padding:8px;border-bottom:1px solid #1a1a1a;color:#9ca3af}
.log-entry:hover{background:#1a1a1a}
.log-timestamp{color:var(--green)}
.log-critical{color:var(--red)}
.log-warning{color:var(--yellow)}
</style>
</head>
<body>

<div id="hud">
  <div>
    <div class="hud-label">Incident Response Timer</div>
    <div id="clock">25:00</div>
  </div>
  <div style="text-align:right">
    <div class="hud-label">Vercel — Serverless (Stateless Demo)</div>
    <div class="hud-btns">
      <button class="btn btn-ghost btn-sm" onclick="resetTimer()">Reset</button>
      <button class="btn btn-sm" id="tbtn" onclick="toggleTimer()">Start</button>
    </div>
  </div>
</div>
<div id="pbar" style="width:100%"></div>

<div class="wrap" id="app-view"></div>

<script>
// ========== TIMER FUNCTIONS ==========
let remaining = 1500;
let running = false;
let iv = null;

function pad(n) {
  return String(n).padStart(2, '0');
}

function drawTimer() {
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  document.getElementById('clock').textContent = pad(m) + ':' + pad(s);
  const pct = (remaining / 1500) * 100;
  document.getElementById('pbar').style.width = pct + '%';
}

function toggleTimer() {
  running = !running;
  document.getElementById('tbtn').textContent = running ? 'Pause' : 'Start';
  if (running) {
    iv = setInterval(() => {
      if (remaining > 0) {
        remaining--;
        drawTimer();
      } else {
        clearInterval(iv);
        running = false;
        document.getElementById('tbtn').textContent = 'Start';
      }
    }, 1000);
  } else {
    clearInterval(iv);
  }
}

function resetTimer() {
  clearInterval(iv);
  running = false;
  remaining = 1500;
  drawTimer();
  document.getElementById('tbtn').textContent = 'Start';
}

drawTimer();

// ========== GLOBAL STATE ==========
let currentUser = null;
let evidenceLog = [];

// ========== HELPER FUNCTIONS ==========
function show(elementId, message, isError) {
  const el = document.getElementById(elementId);
  if (el) {
    el.textContent = message;
    el.style.display = 'block';
    el.className = 'rbox ' + (isError ? 'err' : 'info');
  }
}

function addEvidence(type, detail) {
  const now = new Date();
  const ts = now.toLocaleTimeString();
  evidenceLog.push(`[${ts}] ${type}: ${detail}`);
  updateEvidenceDisplay();
}

function updateEvidenceDisplay() {
  const elog = document.getElementById('elog');
  if (elog) {
    elog.innerHTML = evidenceLog.map(log => `<div style="padding:4px 0; border-bottom:1px solid #1a1a1a; font-family:monospace; font-size:11px">${log}</div>`).join('');
  }
}

function clearEvidence() {
  evidenceLog = [];
  updateEvidenceDisplay();
}

function exportEvidence() {
  const blob = new Blob([evidenceLog.join('\n')], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ir-evidence-' + Date.now() + '.txt';
  a.click();
}

// ========== API FUNCTIONS ==========
async function doLogin() {
  const username = document.getElementById('l-user').value;
  const password = document.getElementById('l-pass').value;
  const isLongPassword = password.length > 100;
  
  try {
    const response = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await response.json();
    show('l-box', `HTTP ${response.status}\n${JSON.stringify(data, null, 2)}`, !response.ok);
    
    if (response.ok) {
      currentUser = data.user;
      if (isLongPassword) {
        addEvidence('LOGIN SUCCESS', `User: ${username} (Role: ${data.user.role}) - Password used: "${password.substring(0, 50)}..." (${password.length} chars) - VULNERABILITY: Long password accepted!`);
      } else {
        addEvidence('LOGIN SUCCESS', `User: ${username} (Role: ${data.user.role}) - Password used: "${password}"`);
      }
      renderAppView();
    } else {
      addEvidence('LOGIN FAILED', `User: ${username} - Password: "${password}" - Error: ${data.error}`);
    }
  } catch (error) {
    console.error('Login error:', error);
    show('l-box', 'Error: ' + error.message + '\n\nMake sure the backend API is deployed!', true);
  }
}

async function doRegister() {
  const username = document.getElementById('r-user').value;
  const email = document.getElementById('r-email').value;
  const password = document.getElementById('r-pass').value;
  
  try {
    const response = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password })
    });
    const data = await response.json();
    show('r-box', `HTTP ${response.status}\n${JSON.stringify(data, null, 2)}`, !response.ok);
    if (response.ok) {
      addEvidence('REGISTRATION', `New user: ${username} - Password: "${password}" (stored in plaintext!)`);
    }
  } catch (error) {
    show('r-box', 'Error: ' + error.message, true);
  }
}

async function doProfile(userId) {
  const id = userId || document.getElementById('p-id')?.value;
  if (!id) {
    alert('Please enter a user ID');
    return;
  }
  
  try {
    const response = await fetch('/api/profile?id=' + encodeURIComponent(id));
    const data = await response.json();
    
    if (document.getElementById('p-box')) {
      show('p-box', `HTTP ${response.status}\n${JSON.stringify(data, null, 2)}`, !response.ok);
    }
    if (document.getElementById('admin-result')) {
      const resultBox = document.getElementById('admin-result');
      resultBox.style.display = 'block';
      resultBox.textContent = JSON.stringify(data, null, 2);
    }
    
    if (response.ok) {
      addEvidence('USER LOOKUP', `Viewed user ID ${id}: ${data.username} - Password: "${data.password}" - Salary: $${data.salary}`);
    } else {
      addEvidence('USER LOOKUP FAILED', `User ID ${id} not found`);
    }
  } catch (error) {
    if (document.getElementById('p-box')) show('p-box', 'Error: ' + error.message, true);
    else alert('Error: ' + error.message);
  }
}

async function doAudit() {
  try {
    const response = await fetch('/api/audit');
    const data = await response.json();
    show('a-box', `HTTP ${response.status}\nTotal Logs: ${data.total}\nServer Info: Vercel Serverless\n\n${JSON.stringify(data.log, null, 2)}`, false);
    addEvidence('AUDIT LOG ACCESS', `Retrieved ${data.total} log entries - No authentication required!`);
  } catch (error) {
    show('a-box', 'Error: ' + error.message, true);
  }
}

// ========== ATTACK SIMULATION ==========
async function simulateFullAttack() {
  await simulateSpecificAttack('full_attack');
}

async function simulateSpecificAttack(actionType) {
  const resultBox = document.getElementById('attack-result');
  resultBox.style.display = 'block';
  resultBox.innerHTML = '🚨 Executing attack simulation... Please wait...';
  resultBox.className = 'rbox info';
  
  try {
    const response = await fetch('/api/attack', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: actionType, target: 'all' })
    });
    
    const data = await response.json();
    
    let html = '<div style="font-family: monospace;">';
    html += '<strong style="color: #f87171;">🚨 ATTACK SIMULATION RESULTS 🚨</strong><br><br>';
    html += '<strong>Attack ID:</strong> ' + data.attack_summary.attack_id + '<br>';
    html += '<strong>Timestamp:</strong> ' + new Date(data.attack_summary.timestamp).toLocaleString() + '<br>';
    html += '<strong>Attacker IP:</strong> ' + data.attack_summary.attacker_ip + '<br>';
    html += '<strong style="color: #facc15;">Vulnerabilities Exploited:</strong><br>';
    
    data.attack_summary.vulnerabilities_used.forEach(v => {
      html += '  🔴 ' + v + '<br>';
    });
    
    html += '<br><strong style="color: #facc15;">Data Exfiltrated:</strong><br>';
    data.attack_summary.details.dataExfiltrated.forEach(item => {
      if (item.type === 'USER_DATA') {
        html += `  📁 User ${item.username}: Password="${item.password}", Email=${item.email}<br>`;
      } else if (item.type === 'CRACKED_CREDENTIALS') {
        html += `  🔑 ${item.count} passwords cracked: `;
        item.credentials.forEach(c => html += `${c.username}:${c.password} `);
        html += '<br>';
      } else if (item.type === 'BACKDOOR_ACCOUNT') {
        html += `  🚪 Backdoor created: ${item.username} / ${item.password}<br>`;
      } else if (item.type === 'ACTIVE_SESSIONS') {
        html += `  🎫 ${item.count} active sessions stolen<br>`;
      } else if (item.type === 'AUDIT_LOG') {
        html += `  📋 ${item.entries} audit log entries stolen<br>`;
      } else if (item.type === 'BUFFER_OVERFLOW_PAYLOAD') {
        html += `  💣 ${item.size} byte buffer overflow payload sent<br>`;
      }
    });
    
    html += '<br><strong style="color: #4ade80;">✅ Attack Complete!</strong><br>';
    html += 'Check the logs above to see evidence of:<br>';
    html += '  • MALWARE_TRIGGERED events<br>';
    html += '  • DATA_EXFILTRATION records<br>';
    html += '  • BRUTE_FORCE_SUCCESS attempts<br>';
    html += '  • BACKDOOR_CREATED entries<br><br>';
    
    html += '<strong style="color: #60a5fa;">🔒 Security Recommendations:</strong><br>';
    data.evidence.recommendations.forEach(rec => {
      html += '  • ' + rec + '<br>';
    });
    
    html += '</div>';
    resultBox.innerHTML = html;
    resultBox.className = 'rbox';
    
    setTimeout(() => {
      fetchServerLogs();
      addEvidence('ATTACK_SIMULATED', `${actionType} attack executed - ${data.attack_summary.vulnerabilities_used.length} vulnerabilities exploited`);
    }, 1000);
    
  } catch (error) {
    resultBox.innerHTML = '❌ Error: ' + error.message + '<br>Make sure the attack endpoint is deployed!';
    resultBox.className = 'rbox err';
  }
}

// ========== ADMIN FUNCTIONS ==========
function logout() {
  currentUser = null;
  evidenceLog = [];
  renderAppView();
}

async function fetchServerLogs() {
  try {
    const response = await fetch('/api/audit');
    const data = await response.json();
    const container = document.getElementById('server-logs-container');
    if (container && data.log) {
      if (data.log.length === 0) {
        container.innerHTML = '<div class="log-entry">⚠️ No logs found. Click the attack button to generate evidence!</div>';
      } else {
        container.innerHTML = data.log.map(log => {
          let logClass = '';
          if (log.type === 'MALWARE_TRIGGERED' || log.type === 'DATA_EXFILTRATION') logClass = 'log-critical';
          else if (log.type === 'BRUTE_FORCE_SUCCESS' || log.type === 'BACKDOOR_CREATED') logClass = 'log-warning';
          else if (log.type === 'LOGIN_SUCCESS') logClass = 'log-warning';
          else if (log.type === 'LOGIN_FAIL') logClass = 'log-critical';
          
          let detailDisplay = JSON.stringify(log.detail, null, 2);
          if (detailDisplay.length > 200) detailDisplay = detailDisplay.substring(0, 200) + '...';
          
          return `
            <div class="log-entry ${logClass}">
              <span class="log-timestamp">[${new Date(log.ts).toLocaleTimeString()}]</span>
              <strong>${log.type}</strong><br>
              <span style="color:#6b7280; font-size:9px">${detailDisplay}</span><br>
              <span style="color:#4b5563; font-size:9px">IP: ${log.ip}</span>
            </div>
          `;
        }).join('');
      }
      addEvidence('LOGS FETCHED', `Retrieved ${data.log.length} log entries from server`);
    }
  } catch (error) {
    console.error('Failed to fetch logs:', error);
  }
}

// ========== RENDER VIEWS ==========
function renderLoginView() {
  return `
    <div style="max-width:500px;margin:0 auto">
      <div class="card">
        <div class="card-head"><h3>Login</h3></div>
        <div class="card-body">
          <input type="text" id="l-user" placeholder="Username" value="admin">
          <input type="password" id="l-pass" placeholder="Password">
          <button class="btn" onclick="doLogin()">Sign In</button>
          <p class="hint">Hint: Use "password123" for admin, or try a very long password (hold down 'A' key)</p>
          <div class="rbox" id="l-box"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>Register</h3></div>
        <div class="card-body">
          <input type="text" id="r-user" placeholder="Username">
          <input type="email" id="r-email" placeholder="Email">
          <input type="password" id="r-pass" placeholder="Password">
          <button class="btn" onclick="doRegister()">Create Account</button>
          <div class="rbox" id="r-box"></div>
        </div>
      </div>
    </div>
  `;
}

function renderAdminView() {
  return `
    <div>
      <div class="card" style="border-color:#4ade80">
        <div class="card-head">
          <h3>Admin Dashboard</h3>
          <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
        </div>
        <div class="card-body">
          <p>Welcome, ${currentUser?.username}!</p>
          <p class="hint" style="color:var(--yellow)">⚠️ Vercel Serverless: Each API function has ISOLATED memory. Logs are fragmented!</p>
        </div>
      </div>

      <!-- Attack Simulation Card -->
      <div class="card" style="border-color: #dc2626;">
        <div class="card-head" style="background: rgba(220, 38, 38, 0.1);">
          <h3>🚨 MALWARE SIMULATION - Click to see attack in action</h3>
        </div>
        <div class="card-body">
          <p style="color: #fca5a5; margin-bottom: 15px; font-size: 13px;">
            ⚠️ This button simulates a real malware attack that exploits multiple vulnerabilities.
            Click it, then check the logs to see what happened!
          </p>
          
          <div class="row" style="gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
            <button class="btn" onclick="simulateFullAttack()" style="background: #dc2626; flex: 1;">
              💣 SIMULATE FULL ATTACK
            </button>
            <button class="btn btn-ghost" onclick="simulateSpecificAttack('harvest_users')" style="flex: 1;">
              👤 Harvest Users
            </button>
            <button class="btn btn-ghost" onclick="simulateSpecificAttack('brute_force')" style="flex: 1;">
              🔓 Brute Force
            </button>
          </div>
          
          <div class="row" style="gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-ghost" onclick="simulateSpecificAttack('steal_sessions')" style="flex: 1;">
              🎫 Steal Sessions
            </button>
            <button class="btn btn-ghost" onclick="simulateSpecificAttack('access_audit')" style="flex: 1;">
              📋 Steal Audit Log
            </button>
            <button class="btn btn-ghost" onclick="simulateSpecificAttack('create_backdoor')" style="flex: 1;">
              🚪 Create Backdoor
            </button>
          </div>
          
          <div id="attack-result" class="rbox" style="display: none; margin-top: 15px; background: #1a0a0a; border-color: #dc2626;"></div>
        </div>
      </div>

      <!-- Educational Comparison Card -->
      <div class="card" style="border-color: var(--red);">
        <div class="card-head" style="background: rgba(127, 29, 29, 0.2);">
          <h3>🔬 FORENSICS LESSON: Serverless vs Persistent Server</h3>
        </div>
        <div class="card-body">
          <div class="row" style="gap: 20px; align-items: stretch; flex-wrap: wrap;">
            
            <div style="flex: 1; background: #0a0a0a; border-radius: 8px; padding: 15px; border-left: 3px solid #f87171;">
              <h4 style="color: #f87171; margin-bottom: 10px;">❌ Vercel (You are here)</h4>
              <p style="font-size: 12px; color: #9ca3af; margin-bottom: 10px;">
                <strong>What you see:</strong><br>
                • Only AUDIT_ACCESSED logs<br>
                • No LOGIN_SUCCESS records<br>
                • No PROFILE_ACCESS entries<br>
                • Attack logs may be MISSING!
              </p>
              <p style="font-size: 12px; color: #fca5a5;">
                <strong>Why?</strong> Each API endpoint runs as a SEPARATE serverless function with ISOLATED memory.
              </p>
            </div>
            
            <div style="flex: 1; background: #0a2a1a; border-radius: 8px; padding: 15px; border-left: 3px solid #4ade80;">
              <h4 style="color: #4ade80; margin-bottom: 10px;">✅ Render (Compare)</h4>
              <p style="font-size: 12px; color: #9ca3af; margin-bottom: 10px;">
                <strong>Complete view:</strong><br>
                • ✓ All attack events visible<br>
                • ✓ Complete forensic timeline<br>
                • ✓ Shared memory across endpoints<br>
                • ✓ Evidence persists
              </p>
              <p style="font-size: 12px; color: #86efac;">
                <strong>Why?</strong> Single persistent Node.js process with SHARED memory.
              </p>
            </div>
            
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>User Lookup (IDOR)</h3></div>
        <div class="card-body">
          <div class="row">
            <input type="number" id="p-id" placeholder="User ID (1, 2, 3, 4)" style="margin-bottom:0">
            <button class="btn" onclick="doProfile()" style="width:auto">Lookup User</button>
          </div>
          <p class="hint">No authentication required! Try IDs 1-4</p>
          <div class="rbox" id="p-box"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>Audit Log (No Authentication)</h3></div>
        <div class="card-body">
          <button class="btn btn-danger" onclick="doAudit()">Access /api/audit</button>
          <p class="hint">🔴 On Vercel, logs are fragmented across functions!</p>
          <div class="rbox" id="a-box"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <h3>📊 Server Logs (Attack Evidence)</h3>
          <div>
            <button class="btn btn-ghost btn-sm" onclick="clearEvidence()">Clear Evidence</button>
            <button class="btn btn-sm" onclick="exportEvidence()" style="margin-left:5px">Export</button>
          </div>
        </div>
        <div class="card-body">
          <div style="background: #1a0a0a; border: 1px solid #7f1d1d; border-radius: 6px; padding: 10px; margin-bottom: 15px;">
            <p style="color: #fca5a5; font-size: 12px; margin-bottom: 5px;">
              🔴 <strong>ATTACK EVIDENCE WILL APPEAR HERE</strong>
            </p>
            <p style="color: #9ca3af; font-size: 11px;">
              Click "Simulate Full Attack" above, then refresh logs to see:
              • MALWARE_TRIGGERED events<br>
              • DATA_EXFILTRATION records with stolen passwords<br>
              • BRUTE_FORCE_SUCCESS attempts<br>
              • BACKDOOR_CREATED entries<br>
              • Complete attack timeline
            </p>
          </div>
          
          <button class="btn" onclick="fetchServerLogs()" style="margin-bottom:10px">🔄 Refresh Logs (See Attack Evidence)</button>
          
          <div id="server-logs-container" class="log-viewer">
            <div class="log-entry">Click "Refresh Logs" - Attack evidence will appear here after simulation</div>
          </div>
          
          <div class="hint" style="margin-top: 10px; background: #1a1a1a; padding: 8px; border-radius: 4px;">
            <code style="color: var(--yellow);">
            🎯 FORENSICS EXERCISE: After clicking the attack button, answer:<br>
            1. What vulnerabilities were exploited?<br>
            2. What data was stolen?<br>
            3. Was a backdoor account created?<br>
            4. How would you fix these vulnerabilities?
            </code>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <h3>Evidence Log</h3>
        </div>
        <div class="card-body">
          <div id="elog" class="log-viewer" style="max-height:300px">
            ${evidenceLog.map(log => `<div style="padding:4px 0; border-bottom:1px solid #1a1a1a; font-family:monospace; font-size:11px">${log}</div>`).join('') || '<div>No evidence collected yet</div>'}
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderAppView() {
  const appDiv = document.getElementById('app-view');
  if (currentUser && currentUser.role === 'admin') {
    appDiv.innerHTML = renderAdminView();
    fetchServerLogs();
  } else {
    appDiv.innerHTML = renderLoginView();
  }
}

// Initial render
renderAppView();
</script>
</body>
</html>
