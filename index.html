<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QA — IR Lab</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--surface:#111;--border:#222;--border2:#2a2a2a;
  --text:#e0e0e0;--muted:#6b7280;--green:#4ade80;--red:#f87171;
  --yellow:#facc15;--blue:#60a5fa;--accent:#1d4ed8;
}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Timer ── */
#hud{position:fixed;top:0;left:0;right:0;height:54px;background:#0a0a0a;
  border-bottom:1px solid var(--border);display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;z-index:200}
#clock{font-size:26px;font-weight:700;font-family:monospace;color:var(--green);transition:color .3s}
#clock.warn{color:var(--yellow)}#clock.crit{color:var(--red)}
#pbar{position:fixed;top:54px;left:0;height:3px;background:var(--green);
  transition:width 1s linear,background .3s;z-index:200}
.hud-label{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.hud-btns{display:flex;gap:8px}

/* ── Layout ── */
.wrap{max-width:900px;margin:0 auto;padding:74px 20px 40px}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border2);border-radius:8px;overflow:hidden;margin-bottom:16px}
.card-head{padding:11px 18px;background:#161616;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center}
.card-head h3{font-size:13px;font-weight:500;color:var(--muted)}
.card-body{padding:18px}
.tag{font-size:10px;padding:1px 8px;border-radius:10px;background:#1c1917;color:#a16207;border:1px solid #292524}

/* ── Forms ── */
.field{margin-bottom:10px}
label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
input[type=text],input[type=email],input[type=password],input[type=number]{
  width:100%;background:#0a0a0a;border:1px solid #333;color:var(--text);
  padding:8px 11px;border-radius:6px;font-size:13px;font-family:inherit}
input:focus{outline:none;border-color:#555}
.btn{display:inline-block;padding:8px 18px;border-radius:6px;font-size:13px;
  font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:background .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#1e40af}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted)}.btn-ghost:hover{background:#1a1a1a}
.btn-danger{background:#7f1d1d;color:#fca5a5}.btn-danger:hover{background:#991b1b}
.btn-sm{padding:5px 12px;font-size:12px}
.row{display:flex;gap:8px;align-items:center}
.row input{margin:0;flex:1}

/* ── Response / log boxes ── */
.rbox{background:#0a0a0a;border:1px solid var(--border);border-radius:6px;
  padding:11px;margin-top:10px;font-family:monospace;font-size:11px;
  color:var(--green);white-space:pre-wrap;max-height:220px;overflow-y:auto;display:none}
.rbox.err{color:var(--red)}.rbox.info{color:var(--blue)}
.hint{font-size:12px;color:var(--muted);margin-top:6px;font-style:italic}

/* ── Evidence ── */
.ebox{background:#0a0a0a;border:1px solid var(--border);border-radius:6px;
  padding:11px;font-family:monospace;font-size:11px;color:var(--green);
  white-space:pre-wrap;min-height:100px;max-height:320px;overflow-y:auto}

/* ── Metrics ── */
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:18px}
.metric{background:#161616;border-radius:6px;padding:12px;text-align:center}
.metric-v{font-size:22px;font-weight:700}
.metric-l{font-size:11px;color:var(--muted);margin-top:2px}
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div>
    <div class="hud-label">Incident Response Timer</div>
    <div id="clock">25:00</div>
  </div>
  <div style="text-align:right">
    <div class="hud-label" style="margin-bottom:4px">QA — Cloud IR Lab</div>
    <div class="hud-btns">
      <button class="btn btn-ghost btn-sm" onclick="resetTimer()">Reset</button>
      <button class="btn btn-primary btn-sm" id="tbtn" onclick="toggleTimer()">Start</button>
    </div>
  </div>
</div>
<div id="pbar" style="width:100%"></div>

<div class="wrap">
  <!-- Dynamic content based on login state -->
  <div id="app-view">
    <!-- Login form will be shown here by default -->
  </div>
</div>

<script>
// ── Timer ──────────────────────────────────────
const TOTAL = 25*60;
let remaining = TOTAL, running = false, iv = null;
let currentUser = null; // Store logged in user

function pad(n){return String(n).padStart(2,'0')}
function drawTimer(){
  const m=Math.floor(remaining/60),s=remaining%60;
  const el=document.getElementById('clock');
  el.textContent=pad(m)+':'+pad(s);
  el.className=remaining<300?'crit':remaining<600?'warn':'';
  const pct=(remaining/TOTAL)*100;
  const pb=document.getElementById('pbar');
  pb.style.width=pct+'%';
  pb.style.background=remaining<300?'#f87171':remaining<600?'#facc15':'#4ade80';
}
function toggleTimer(){
  running=!running;
  document.getElementById('tbtn').textContent=running?'Pause':'Resume';
  if(running){iv=setInterval(()=>{if(remaining>0){remaining--;drawTimer();}else{clearInterval(iv);running=false;document.getElementById('tbtn').textContent='Start';}},1000);}
  else clearInterval(iv);
}
function resetTimer(){clearInterval(iv);running=false;remaining=TOTAL;document.getElementById('tbtn').textContent='Start';drawTimer();}
drawTimer();

// ── Evidence ──────────────────────────────────
let evidenceLog = [];
let metrics = {req:0,fail:0,idor:0};

function addEvidence(type,detail){
  const now=new Date();
  const ts=[now.getHours(),now.getMinutes(),now.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  evidenceLog.push(`[${ts}] ${type}\n         ${detail}`);
  updateEvidenceDisplay();
  metrics.req++;
  updateMetrics();
}

function updateEvidenceDisplay(){
  const box=document.getElementById('elog');
  if(box) box.textContent = '# IR Evidence Log — CorpPortal\n' + evidenceLog.join('\n');
}

function updateMetrics(){
  const mReq = document.getElementById('m-req');
  const mFail = document.getElementById('m-fail');
  const mIdor = document.getElementById('m-idor');
  if(mReq) mReq.textContent = metrics.req;
  if(mFail) mFail.textContent = metrics.fail;
  if(mIdor) mIdor.textContent = metrics.idor;
}

function clearEvidence(){
  evidenceLog = [];
  updateEvidenceDisplay();
}

function exportEvidence(){
  const blob=new Blob(['# IR Evidence Log — CorpPortal\n' + evidenceLog.join('\n')],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='ir-evidence-'+Date.now()+'.txt';a.click();
}

// ── API helpers ───────────────────────────────
function show(id,text,isErr){
  const b=document.getElementById(id);
  if(!b) return;
  b.style.display='block';b.textContent=text;
  b.className='rbox'+(isErr?' err':b.className.includes('info')?' info':'');
}

async function doLogin(){
  const u=document.getElementById('l-user').value;
  const p=document.getElementById('l-pass').value;
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    show('l-box','HTTP '+r.status+'\n'+JSON.stringify(d,null,2),!r.ok);
    if(!r.ok){
      metrics.fail++;
      updateMetrics();
      addEvidence('LOGIN FAIL','user='+u+' status='+r.status+' error='+d.error);
    } else {
      currentUser = d.user;
      addEvidence('LOGIN SUCCESS','user='+u+' role='+d.user?.role);
      renderAppView(); // Switch to admin panel if admin
    }
  }catch(e){show('l-box','Error: '+e.message,true);}
}

async function doRegister(){
  const u=document.getElementById('r-user').value;
  const e=document.getElementById('r-email').value;
  const p=document.getElementById('r-pass').value;
  try{
    const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,email:e,password:p})});
    const d=await r.json();
    show('r-box','HTTP '+r.status+'\n'+JSON.stringify(d,null,2),!r.ok);
    addEvidence('REGISTER','user='+u+' status='+r.status+' password_in_response='+d.user?.password);
  }catch(e){show('r-box','Error: '+e.message,true);}
}

async function doProfile(){
  const id=document.getElementById('p-id').value;
  try{
    const r=await fetch('/api/profile?id='+encodeURIComponent(id));
    const d=await r.json();
    show('p-box','HTTP '+r.status+'\n'+JSON.stringify(d,null,2),!r.ok);
    if(r.ok){
      metrics.idor++;
      updateMetrics();
      addEvidence('IDOR PROBE','id='+id+' user='+d.username+' password='+d.password+' salary='+d.salary);
    }
  }catch(e){show('p-box','Error: '+e.message,true);}
}

async function doAudit(){
  try{
    const r=await fetch('/api/audit');
    const d=await r.json();
    show('a-box','HTTP '+r.status+'\n'+JSON.stringify(d,null,2),false);
    addEvidence('AUDIT LOG ACCESSED','No auth required. '+d.total+' entries returned.');
  }catch(e){show('a-box','Error: '+e.message,true);}
}

// ── Vulnerability Demo: No Password Login ──
async function demoNoPasswordLogin(){
  const username = document.getElementById('demo-user').value;
  if(!username){
    alert('Enter a username first');
    return;
  }
  try{
    // Demonstrating that ANY password works due to backend vulnerability
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username,password:'anything_works'})});
    const d=await r.json();
    show('demo-box','HTTP '+r.status+'\n🔴 VULNERABILITY DEMO: Login succeeded with fake password!\n\n'+JSON.stringify(d,null,2),false);
    if(r.ok){
      currentUser = d.user;
      addEvidence('NO PASSWORD LOGIN','Logged in as '+username+' without valid password');
      renderAppView();
    }
  }catch(e){show('demo-box','Error: '+e.message,true);}
}

// ── Admin User Lookup ──
async function adminLookup(){
  const userId = document.getElementById('admin-user-id').value;
  if(!userId){
    alert('Enter a user ID');
    return;
  }
  try{
    const r=await fetch('/api/profile?id='+encodeURIComponent(userId));
    const d=await r.json();
    const resultBox = document.getElementById('admin-result');
    resultBox.style.display = 'block';
    resultBox.textContent = JSON.stringify(d, null, 2);
    addEvidence('ADMIN LOOKUP','Admin viewed user ID '+userId);
  }catch(e){
    alert('Error: '+e.message);
  }
}

// ── Render Views ──
function renderLoginView(){
  return `
    <div style="max-width:500px;margin:0 auto">
      <div class="card">
        <div class="card-head"><h3>Login <span class="tag">POST /api/login</span></h3></div>
        <div class="card-body">
          <div class="field"><label>Username</label><input type="text" id="l-user" placeholder="admin"></div>
          <div class="field"><label>Password</label><input type="password" id="l-pass" placeholder="password"></div>
          <button class="btn btn-primary" onclick="doLogin()">Sign in</button>
          <p class="hint">Observe the full JSON response carefully.</p>
          <div class="rbox" id="l-box"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>Register <span class="tag">POST /api/register</span></h3></div>
        <div class="card-body">
          <div class="field"><label>Username</label><input type="text" id="r-user" placeholder="newuser"></div>
          <div class="field"><label>Email</label><input type="email" id="r-email" placeholder="you@example.com"></div>
          <div class="field"><label>Password</label><input type="password" id="r-pass" placeholder="choose a password"></div>
          <button class="btn btn-primary" onclick="doRegister()">Create account</button>
          <p class="hint">What does the server return after registration?</p>
          <div class="rbox" id="r-box"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>🔴 VULNERABILITY DEMO: Login Without Password</h3></div>
        <div class="card-body">
          <div class="row">
            <input type="text" id="demo-user" placeholder="Enter any username (e.g., admin)" style="flex:1">
            <button class="btn btn-danger" onclick="demoNoPasswordLogin()">Try Login (Any Password)</button>
          </div>
          <p class="hint">This demonstrates a critical authentication bypass vulnerability.</p>
          <div class="rbox info" id="demo-box"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>User profile lookup (IDOR Demo) <span class="tag">GET /api/profile?id=</span></h3></div>
        <div class="card-body">
          <div class="row">
            <input type="number" id="p-id" placeholder="User ID (1,2,3,4)" min="1">
            <button class="btn btn-primary" onclick="doProfile()">Fetch profile</button>
          </div>
          <p class="hint">No login required. Try ID 4 for a surprise!</p>
          <div class="rbox" id="p-box"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>Internal audit log <span class="tag">GET /api/audit</span></h3></div>
        <div class="card-body">
          <button class="btn btn-danger" onclick="doAudit()">Access /api/audit</button>
          <p class="hint">No authentication required - internal logs exposed!</p>
          <div class="rbox info" id="a-box"></div>
        </div>
      </div>
    </div>
  `;
}

function renderAdminView(){
  return `
    <div style="max-width:700px;margin:0 auto">
      <div class="card" style="border-color:var(--green)">
        <div class="card-head" style="background:rgba(74,222,128,0.1)">
          <h3>👑 Admin Dashboard - User Management</h3>
          <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
        </div>
        <div class="card-body">
          <div class="field">
            <label>🔍 User Lookup (IDOR still works here)</label>
            <div class="row">
              <input type="number" id="admin-user-id" placeholder="Enter User ID (1-4)" min="1" max="4">
              <button class="btn btn-primary" onclick="adminLookup()">Lookup User</button>
            </div>
          </div>
          <div class="rbox" id="admin-result" style="display:none; margin-top:15px"></div>
          <p class="hint">⚠️ Notice: Even as admin, the same IDOR vulnerability exists.</p>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>📊 Metrics & Evidence Log</h3></div>
        <div class="card-body">
          <div class="metrics">
            <div class="metric"><div class="metric-v" id="m-req">${metrics.req}</div><div class="metric-l">Requests made</div></div>
            <div class="metric"><div class="metric-v" id="m-fail" style="color:var(--red)">${metrics.fail}</div><div class="metric-l">Failed logins</div></div>
            <div class="metric"><div class="metric-v" id="m-idor" style="color:var(--yellow)">${metrics.idor}</div><div class="metric-l">IDOR probes</div></div>
          </div>
          
          <div style="margin-top:20px">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px">
              <h3>Evidence Log</h3>
              <div>
                <button class="btn btn-ghost btn-sm" onclick="clearEvidence()">Clear</button>
                <button class="btn btn-primary btn-sm" onclick="exportEvidence()">Export .txt</button>
              </div>
            </div>
            <div class="ebox" id="elog"># IR Evidence Log — CorpPortal\n${evidenceLog.join('\n')}</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderAppView(){
  const appDiv = document.getElementById('app-view');
  if(currentUser && currentUser.role === 'admin'){
    appDiv.innerHTML = renderAdminView();
    updateMetrics();
    updateEvidenceDisplay();
  } else {
    appDiv.innerHTML = renderLoginView();
  }
}

function logout(){
  currentUser = null;
  renderAppView();
}

// Initial render
renderAppView();
</script>
</body>
</html>
