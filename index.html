<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IR Lab — Attack Simulation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--surface:#111;--border:#222;--border2:#2a2a2a;
  --text:#e0e0e0;--muted:#6b7280;--green:#4ade80;--red:#f87171;
  --yellow:#facc15;--blue:#60a5fa;--accent:#1d4ed8;
}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#hud{position:fixed;top:0;left:0;right:0;background:#0a0a0a;
  border-bottom:1px solid var(--border);z-index:200;padding:10px 20px;}
.timer-container{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap}
.timer-box{text-align:center;flex:1}
.timer-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.timer-value{font-size:24px;font-weight:700;font-family:monospace}
.timer-warning{font-size:9px;margin-top:2px}
#investigation-timer{color:var(--green)}
#coldstart-timer{color:var(--blue)}
.button-group{display:flex;gap:8px}
.btn{background:#1d4ed8;color:#fff;border:none;cursor:pointer;font-weight:500;padding:6px 14px;border-radius:6px;font-size:12px}
.btn-ghost{background:#333;color:#fff}
.btn-sm{padding:4px 10px}
#pbar{position:fixed;top:105px;left:0;height:3px;background:var(--green);transition:width 1s linear;z-index:200}
.wrap{max-width:1200px;margin:0 auto;padding:120px 20px 40px}
.card{background:var(--surface);border:1px solid #2a2a2a;border-radius:8px;margin-bottom:16px}
.card-head{padding:11px 18px;background:#161616;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center}
.card-head h3{font-size:13px;font-weight:500;color:var(--muted)}
.card-body{padding:18px}
input, button{width:100%;margin-bottom:10px;padding:8px;border-radius:6px}
input{background:#0a0a0a;border:1px solid #333;color:var(--text);font-family:monospace}
.btn-danger{background:#7f1d1d}
.btn-warning{background:#78350f;color:#fde68a}
.rbox{background:#0a0a0a;border:1px solid #333;border-radius:6px;padding:11px;margin-top:10px;
  font-family:monospace;font-size:11px;white-space:pre-wrap;display:none;max-height:500px;overflow-y:auto}
.rbox.err{color:var(--red)}
.rbox.info{color:var(--blue)}
.rbox.success{color:var(--green)}
.hint{font-size:12px;color:var(--muted);margin-top:6px}
.row{display:flex;gap:8px;align-items:center}
.row button{width:auto}
.log-viewer{background:#0a0a0a;border:1px solid #333;border-radius:6px;padding:12px;margin-top:15px;max-height:400px;overflow-y:auto}
.log-entry{font-family:monospace;font-size:10px;padding:8px;border-bottom:1px solid #1a1a1a;color:#9ca3af}
.log-entry:hover{background:#1a1a1a}
.log-timestamp{color:var(--green)}
.log-critical{color:var(--red)}
.log-warning{color:var(--yellow)}
.log-success{color:var(--green)}
</style>
</head>
<body>

<div id="hud">
  <div class="timer-container">
    <div class="timer-box">
      <div class="timer-label">🔍 Investigation Timer</div>
      <div class="timer-value" id="investigation-timer">07:00</div>
      <div class="timer-warning" id="investigation-warning"></div>
    </div>
    <div class="timer-box">
      <div class="timer-label">⚠️ Vercel Cold Start Timer</div>
      <div class="timer-value" id="coldstart-timer">05:00</div>
      <div class="timer-warning" id="coldstart-warning">Logs will be DELETED!</div>
    </div>
    <div class="button-group">
      <button class="btn btn-ghost btn-sm" onclick="resetInvestigationTimer()">Reset</button>
      <button class="btn btn-sm" id="tbtn" onclick="toggleInvestigationTimer()">Start</button>
    </div>
  </div>
</div>
<div id="pbar" style="width:100%"></div>

<div class="wrap" id="app-view"></div>

<script>
// ========== INVESTIGATION TIMER (7 minutes = 420 seconds) ==========
let investigationRemaining = 420;
let investigationRunning = false;
let investigationIv = null;
let attackerLeftShown = false;

// ========== COLD START TIMER (5 minutes = 300 seconds) ==========
let coldstartRemaining = 300;
let coldstartRunning = true;
let coldstartIv = null;
let coldstartWarningShown = false;

function pad(n) {
  return String(n).padStart(2, '0');
}

// Draw both timers
function drawTimers() {
  // Investigation timer
  const invM = Math.floor(investigationRemaining / 60);
  const invS = investigationRemaining % 60;
  const invEl = document.getElementById('investigation-timer');
  invEl.textContent = pad(invM) + ':' + pad(invS);
  
  if (investigationRemaining < 60) {
    invEl.style.color = '#f87171';
    document.getElementById('investigation-warning').innerHTML = '⚠️ CRITICAL - Attacker will delete logs!';
    document.getElementById('investigation-warning').style.color = '#f87171';
  } else if (investigationRemaining < 120) {
    invEl.style.color = '#facc15';
    document.getElementById('investigation-warning').innerHTML = '⚠️ Attacker preparing to delete logs';
    document.getElementById('investigation-warning').style.color = '#facc15';
  } else {
    invEl.style.color = '#4ade80';
    document.getElementById('investigation-warning').innerHTML = '';
  }
  
  // Progress bar (based on investigation timer)
  const pct = (investigationRemaining / 420) * 100;
  const pb = document.getElementById('pbar');
  pb.style.width = pct + '%';
  
  if (investigationRemaining < 60) {
    pb.style.background = '#f87171';
  } else if (investigationRemaining < 120) {
    pb.style.background = '#facc15';
  } else {
    pb.style.background = '#4ade80';
  }
  
  // Cold start timer (5 minutes = 300 seconds)
  const csM = Math.floor(coldstartRemaining / 60);
  const csS = coldstartRemaining % 60;
  const csEl = document.getElementById('coldstart-timer');
  csEl.textContent = pad(csM) + ':' + pad(csS);
  
  if (coldstartRemaining < 60) {
    csEl.style.color = '#f87171';
    document.getElementById('coldstart-warning').innerHTML = '🔴 IMMINENT - Serverless function will COLD START!';
    document.getElementById('coldstart-warning').style.color = '#f87171';
  } else if (coldstartRemaining < 120) {
    csEl.style.color = '#facc15';
    document.getElementById('coldstart-warning').innerHTML = '⚠️ Logs will be DELETED soon!';
    document.getElementById('coldstart-warning').style.color = '#facc15';
  } else {
    csEl.style.color = '#60a5fa';
    document.getElementById('coldstart-warning').innerHTML = 'Logs will be DELETED on cold start';
    document.getElementById('coldstart-warning').style.color = '#6b7280';
  }
  
  // Check for attacker deletion (4 minute mark = 240 seconds elapsed = 180 remaining)
  if (investigationRemaining <= 180 && !attackerLeftShown && currentUser && currentUser.role === 'admin') {
    attackerLeftShown = true;
    showAttackerLeftMessage();
  }
  
  // Check for cold start (when timer reaches 0)
  if (coldstartRemaining <= 0 && !coldstartWarningShown) {
    coldstartWarningShown = true;
    showColdStartMessage();
  }
}

// Attacker deleted logs message
function showAttackerLeftMessage() {
  addEvidence('🚨 ATTACKER ACTION', 'Attacker deleted traces and logged out! Investigation window closing...');
  
  const container = document.getElementById('server-logs-container');
  if (container) {
    container.innerHTML = '<div class="log-entry log-critical">⚠️ LOGS DELETED BY ATTACKER ⚠️<br>The attacker manually wiped the logs at the 4-minute mark!</div>';
  }
  
  addEvidence('⚠️ EVIDENCE LOST', 'Attacker deleted server logs. In a real incident, critical evidence would be gone!');
  
  setTimeout(() => {
    if (currentUser) {
      alert('🚨 ATTACKER LEFT AND DELETED TRACES! 🚨\n\nThe attacker has completed their attack and wiped the logs. You are being logged out.\n\nAs an investigator, you must act FAST in serverless environments!');
      logout();
    }
  }, 2000);
}

// Vercel cold start message
function showColdStartMessage() {
  addEvidence('⚠️ SERVERLESS COLD START', 'Vercel function is cold starting! ALL in-memory logs are being DELETED!');
  
  const container = document.getElementById('server-logs-container');
  if (container) {
    container.innerHTML = '<div class="log-entry log-critical">🔴 VERCEL COLD START OCCURRED 🔴<br>The serverless function restarted. ALL logs have been wiped from memory!<br><br>This demonstrates why serverless platforms are challenging for incident response - evidence disappears automatically!</div>';
  }
  
  addEvidence('💀 EVIDENCE DESTROYED', 'Serverless cold start wiped all logs. No forensic evidence remains!');
  
  // Auto logout after cold start
  setTimeout(() => {
    if (currentUser) {
      alert('🔴 VERCEL COLD START! 🔴\n\nThe serverless function has restarted and ALL logs have been wiped from memory.\n\nYou are being logged out. This demonstrates why persistent servers are better for security investigations!');
      logout();
    }
  }, 3000);
}

// Investigation timer controls
function toggleInvestigationTimer() {
  investigationRunning = !investigationRunning;
  document.getElementById('tbtn').textContent = investigationRunning ? 'Pause' : 'Start';
  if (investigationRunning) {
    investigationIv = setInterval(() => {
      if (investigationRemaining > 0) {
        investigationRemaining--;
        drawTimers();
      } else {
        clearInterval(investigationIv);
        investigationRunning = false;
        document.getElementById('tbtn').textContent = 'Start';
        if (currentUser) {
          alert('⏰ Investigation time is over! You are being logged out.');
          logout();
        }
      }
    }, 1000);
  } else {
    clearInterval(investigationIv);
  }
}

function resetInvestigationTimer() {
  clearInterval(investigationIv);
  investigationRunning = false;
  investigationRemaining = 420;
  attackerLeftShown = false;
  drawTimers();
  document.getElementById('tbtn').textContent = 'Start';
}

// Cold start timer (runs automatically)
function startColdStartTimer() {
  coldstartIv = setInterval(() => {
    if (coldstartRemaining > 0) {
      coldstartRemaining--;
      drawTimers();
    } else {
      clearInterval(coldstartIv);
    }
  }, 1000);
}

startColdStartTimer();
drawTimers();

// ========== GLOBAL STATE ==========
let currentUser = null;
let evidenceLog = [];

function show(elementId, message, isError) {
  const el = document.getElementById(elementId);
  if (el) {
    el.textContent = message;
    el.style.display = 'block';
    el.className = 'rbox ' + (isError ? 'err' : 'info');
  }
}

function addEvidence(type, detail) {
  const now = new Date();
  const ts = now.toLocaleTimeString();
  const invMinutes = Math.floor(investigationRemaining / 60);
  const invSeconds = investigationRemaining % 60;
  const csMinutes = Math.floor(coldstartRemaining / 60);
  const csSeconds = coldstartRemaining % 60;
  const timeInfo = `Inv: ${invMinutes}:${pad(invSeconds)} | CS: ${csMinutes}:${pad(csSeconds)}`;
  evidenceLog.push(`[${ts}] [${timeInfo}] ${type}: ${detail}`);
  updateEvidenceDisplay();
}

function updateEvidenceDisplay() {
  const elog = document.getElementById('elog');
  if (elog) {
    elog.innerHTML = evidenceLog.map(log => `<div style="padding:4px 0; border-bottom:1px solid #1a1a1a; font-family:monospace; font-size:11px; white-space:pre-wrap">${log}</div>`).join('');
  }
}

function clearEvidence() {
  evidenceLog = [];
  updateEvidenceDisplay();
}

function exportEvidence() {
  const blob = new Blob([evidenceLog.join('\n')], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ir-evidence-' + Date.now() + '.txt';
  a.click();
}

// ========== API FUNCTIONS ==========
async function doLogin() {
  const username = document.getElementById('l-user').value;
  const password = document.getElementById('l-pass').value;
  
  try {
    const response = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await response.json();
    show('l-box', 'HTTP ' + response.status + '\n' + JSON.stringify(data, null, 2), !response.ok);
    
    if (response.ok) {
      currentUser = data.user;
      addEvidence('LOGIN SUCCESS', 'User: ' + username + ' (Role: ' + data.user.role + ') - Password used: "' + password + '"');
      renderAppView();
      
      if (!investigationRunning) {
        toggleInvestigationTimer();
      }
    } else {
      addEvidence('LOGIN FAILED', 'User: ' + username + ' - Password: "' + password + '" - Error: ' + data.error);
    }
  } catch (error) {
    console.error('Login error:', error);
    show('l-box', 'Error: ' + error.message, true);
  }
}

async function doRegister() {
  const username = document.getElementById('r-user').value;
  const email = document.getElementById('r-email').value;
  const password = document.getElementById('r-pass').value;
  
  try {
    const response = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password })
    });
    const data = await response.json();
    show('r-box', 'HTTP ' + response.status + '\n' + JSON.stringify(data, null, 2), !response.ok);
    if (response.ok) {
      addEvidence('REGISTRATION', 'New user: ' + username + ' - Password: "' + password + '" (🔴 stored in plaintext!)');
    }
  } catch (error) {
    show('r-box', 'Error: ' + error.message, true);
  }
}

async function doProfile(userId) {
  const id = userId || document.getElementById('p-id')?.value;
  if (!id) {
    alert('Please enter a user ID');
    return;
  }
  
  try {
    const response = await fetch('/api/profile?id=' + encodeURIComponent(id));
    const data = await response.json();
    
    if (document.getElementById('p-box')) {
      show('p-box', 'HTTP ' + response.status + '\n' + JSON.stringify(data, null, 2), !response.ok);
    }
    
    if (response.ok) {
      addEvidence('🔴 IDOR EXPLOIT', 'Viewed user ID ' + id + ': ' + data.username + ' - Password: "' + data.password + '" - Credit Card: ' + (data.credit_card || 'N/A') + ' - SSN: ' + (data.ssn || 'N/A'));
    }
  } catch (error) {
    if (document.getElementById('p-box')) show('p-box', 'Error: ' + error.message, true);
  }
}

async function doAudit() {
  try {
    const response = await fetch('/api/audit');
    const data = await response.json();
    show('a-box', 'HTTP ' + response.status + '\nTotal Logs: ' + (data.total || 0) + '\n\n' + JSON.stringify(data.log || [], null, 2), false);
    addEvidence('AUDIT LOG ACCESS', 'Retrieved ' + (data.total || 0) + ' log entries - 🔴 No authentication required!');
  } catch (error) {
    show('a-box', 'Error: ' + error.message, true);
  }
}

// ========== ATTACK SIMULATION ==========
async function simulateFullAttack() {
  addEvidence('🚨 ATTACK STARTED', 'Malware simulation triggered - Beginning 8-step attack');
  
  try {
    const response = await fetch('/api/attack', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'full_attack', target: 'all' })
    });
    
    const data = await response.json();
    
    if (data.formatted_attack_log) {
      const attackLines = data.formatted_attack_log.split('\n');
      for (let i = 0; i < attackLines.length; i++) {
        const line = attackLines[i];
        if (line.trim().length > 0) {
          addEvidence('🔍 ATTACK DETAIL', line);
        }
      }
    }
    
    if (data.evidence && data.evidence.stolen_passwords) {
      addEvidence('📊 STOLEN DATA SUMMARY', 'Total users compromised: ' + data.evidence.stolen_passwords.length);
      data.evidence.stolen_passwords.forEach(function(user) {
        addEvidence('👤 STOLEN USER', user.username + ': Password="' + user.password + '" | Credit Card: ' + (user.credit_card || 'N/A') + ' | SSN: ' + (user.ssn || 'N/A'));
      });
    }
    
    if (data.evidence && data.evidence.backdoor_credentials) {
      addEvidence('🚪 BACKDOOR ACCOUNT', 'Username: ' + data.evidence.backdoor_credentials.username + ' | Password: ' + data.evidence.backdoor_credentials.password);
    }
    
    if (data.evidence && data.evidence.vulnerabilities) {
      addEvidence('🔴 VULNERABILITIES EXPLOITED', data.evidence.vulnerabilities.length + ' vulnerabilities found');
      data.evidence.vulnerabilities.forEach(function(v) {
        addEvidence('  • VULNERABILITY', v);
      });
    }
    
    if (data.evidence && data.evidence.recommendations) {
      addEvidence('🔒 SECURITY RECOMMENDATIONS', 'Implement these fixes:');
      data.evidence.recommendations.forEach(function(rec) {
        addEvidence('  • RECOMMENDATION', rec);
      });
    }
    
    var compromisedCount = (data.attack_summary && data.attack_summary.data_stolen && data.attack_summary.data_stolen.users_compromised) ? data.attack_summary.data_stolen.users_compromised : 'Multiple';
    addEvidence('✅ ATTACK COMPLETE', 'Full attack executed. ' + compromisedCount + ' users compromised, backdoor created.');
    
    const resultBox = document.getElementById('attack-result');
    if (resultBox) {
      resultBox.style.display = 'block';
      resultBox.innerHTML = '✅ Attack completed successfully! Check the Evidence Log for all details.';
      resultBox.className = 'rbox success';
      setTimeout(function() {
        resultBox.style.display = 'none';
      }, 3000);
    }
    
    setTimeout(function() {
      if (currentUser && currentUser.role === 'admin') {
        fetchServerLogs();
      }
    }, 1000);
    
  } catch (error) {
    addEvidence('❌ ATTACK FAILED', 'Error: ' + error.message);
  }
}

// ========== ADMIN FUNCTIONS ==========
function logout() {
  addEvidence('LOGOUT', 'User logged out. Investigation session ended.');
  currentUser = null;
  evidenceLog = [];
  renderAppView();
  if (investigationRunning) {
    toggleInvestigationTimer();
  }
  resetInvestigationTimer();
}

async function fetchServerLogs() {
  try {
    const response = await fetch('/api/audit');
    const data = await response.json();
    const container = document.getElementById('server-logs-container');
    if (container && data.log) {
      if (data.log.length === 0) {
        container.innerHTML = '<div class="log-entry">⚠️ No logs found. Click the attack button to generate evidence!</div>';
      } else {
        container.innerHTML = data.log.map(function(log) {
          let logClass = '';
          if (log.type && (log.type.includes('ATTACK') || log.type === 'DATA_EXFILTRATION')) logClass = 'log-critical';
          else if (log.type && (log.type.includes('SUCCESS') || log.type === 'BACKDOOR_CREATED')) logClass = 'log-warning';
          else if (log.type === 'LOGIN_SUCCESS') logClass = 'log-success';
          
          let detailDisplay = JSON.stringify(log.detail, null, 2);
          if (detailDisplay.length > 200) detailDisplay = detailDisplay.substring(0, 200) + '...';
          
          return `
            <div class="log-entry ${logClass}">
              <span class="log-timestamp">[${new Date(log.ts).toLocaleTimeString()}]</span>
              <strong>${log.type || 'UNKNOWN'}</strong><br>
              <span style="color:#6b7280; font-size:9px">${detailDisplay}</span>
            </div>
          `;
        }).join('');
      }
      addEvidence('LOGS REFRESHED', 'Retrieved ' + data.log.length + ' log entries');
    }
  } catch (error) {
    console.error('Failed to fetch logs:', error);
  }
}

// ========== RENDER VIEWS ==========
function renderLoginView() {
  return `
    <div style="max-width:600px;margin:0 auto">
      <div class="card" style="border-color: #dc2626; margin-bottom: 20px;">
        <div class="card-head" style="background: rgba(220, 38, 38, 0.2);">
          <h3 style="color: #fca5a5;">🚨 MALWARE SIMULATION - Click to see attack in action</h3>
        </div>
        <div class="card-body">
          <p style="color: #fca5a5; margin-bottom: 15px; font-size: 14px;">
            ⚠️ This button simulates a real malware attack that exploits multiple vulnerabilities. Click it to see the attack in action!
          </p>
          
          <button class="btn" onclick="simulateFullAttack()" style="background: #dc2626; padding: 12px; font-size: 16px; font-weight: bold;">
            💣 SIMULATE FULL ATTACK
          </button>
          
          <div id="attack-result" class="rbox" style="display: none; margin-top: 15px;"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>Login</h3></div>
        <div class="card-body">
          <input type="text" id="l-user" placeholder="Username" value="admin">
          <input type="password" id="l-pass" placeholder="Password">
          <button class="btn" onclick="doLogin()">Sign In</button>
          <p class="hint">Use "password123" for admin access</p>
          <div class="rbox" id="l-box"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>Register</h3></div>
        <div class="card-body">
          <input type="text" id="r-user" placeholder="Username">
          <input type="email" id="r-email" placeholder="Email">
          <input type="password" id="r-pass" placeholder="Password">
          <button class="btn" onclick="doRegister()">Create Account</button>
          <div class="rbox" id="r-box"></div>
        </div>
      </div>
    </div>
  `;
}

function renderAdminView() {
  return `
    <div>
      <div class="card" style="border-color:#4ade80">
        <div class="card-head">
          <h3>Admin Dashboard</h3>
          <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
        </div>
        <div class="card-body">
          <p>Welcome, ${currentUser ? currentUser.username : 'Admin'}!</p>
          <p class="hint" style="color:var(--yellow)">⚠️ Two threats to evidence: Attacker deletes logs at 4 min, Vercel cold start at 5 min!</p>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>User Lookup (IDOR Vulnerability)</h3></div>
        <div class="card-body">
          <div class="row">
            <input type="number" id="p-id" placeholder="User ID (1, 2, 3, 4)" style="margin-bottom:0">
            <button class="btn" onclick="doProfile()" style="width:auto">Lookup User</button>
          </div>
          <p class="hint">🔴 No authentication required! Try IDs 1-4 to see credit cards and SSNs</p>
          <div class="rbox" id="p-box"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>Audit Log (No Authentication)</h3></div>
        <div class="card-body">
          <button class="btn btn-danger" onclick="doAudit()">Access /api/audit</button>
          <p class="hint">🔴 Internal audit log exposed with no authentication!</p>
          <div class="rbox" id="a-box"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <h3>📊 Server Logs (Attack Evidence)</h3>
          <div>
            <button class="btn btn-ghost btn-sm" onclick="clearEvidence()">Clear Evidence</button>
            <button class="btn btn-sm" onclick="exportEvidence()" style="margin-left:5px">Export</button>
          </div>
        </div>
        <div class="card-body">
          <button class="btn" onclick="fetchServerLogs()" style="margin-bottom:10px">🔄 Refresh Logs</button>
          <div id="server-logs-container" class="log-viewer">
            <div class="log-entry">Click "Refresh Logs" - Attack evidence will appear here after simulation</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <h3>Evidence Log</h3>
        </div>
        <div class="card-body">
          <div id="elog" class="log-viewer" style="max-height:400px; font-family:monospace; font-size:11px">
            ${evidenceLog.length > 0 ? evidenceLog.map(log => `<div style="padding:4px 0; border-bottom:1px solid #1a1a1a; white-space:pre-wrap">${log}</div>`).join('') : '<div>No evidence collected yet - Click "SIMULATE FULL ATTACK" to begin!</div>'}
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderAppView() {
  const appDiv = document.getElementById('app-view');
  if (currentUser && currentUser.role === 'admin') {
    appDiv.innerHTML = renderAdminView();
    fetchServerLogs();
  } else {
    appDiv.innerHTML = renderLoginView();
  }
}

renderAppView();
</script>
</body>
</html>
