<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QA — IR Lab</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--surface:#111;--border:#222;--border2:#2a2a2a;
  --text:#e0e0e0;--muted:#6b7280;--green:#4ade80;--red:#f87171;
  --yellow:#facc15;--blue:#60a5fa;--accent:#1d4ed8;
}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#hud{position:fixed;top:0;left:0;right:0;height:54px;background:#0a0a0a;
  border-bottom:1px solid var(--border);display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;z-index:200}
#clock{font-size:26px;font-weight:700;font-family:monospace;color:var(--green)}
#pbar{position:fixed;top:54px;left:0;height:3px;background:var(--green);transition:width 1s linear;z-index:200}
.hud-label{font-size:11px;color:var(--muted);text-transform:uppercase}
.hud-btns{display:flex;gap:8px}
.wrap{max-width:900px;margin:0 auto;padding:74px 20px 40px}
.card{background:var(--surface);border:1px solid #2a2a2a;border-radius:8px;margin-bottom:16px}
.card-head{padding:11px 18px;background:#161616;border-bottom:1px solid #222}
.card-body{padding:18px}
input, button{width:100%;margin-bottom:10px;padding:8px;border-radius:6px}
input{background:#0a0a0a;border:1px solid #333;color:var(--text)}
.btn{background:#1d4ed8;color:#fff;border:none;cursor:pointer}
.btn-danger{background:#7f1d1d}
.btn-ghost{background:#333;color:#fff}
.rbox{background:#0a0a0a;border:1px solid #333;border-radius:6px;padding:11px;margin-top:10px;
  font-family:monospace;font-size:11px;white-space:pre-wrap;display:none}
.rbox.err{color:var(--red)}
.rbox.info{color:var(--blue)}
.hint{font-size:12px;color:var(--muted);margin-top:6px}
.row{display:flex;gap:8px}
.row button{width:auto}
</style>
</head>
<body>

<div id="hud">
  <div>
    <div class="hud-label">Incident Response Timer</div>
    <div id="clock">25:00</div>
  </div>
  <div style="text-align:right">
    <div class="hud-label">QA — Cloud IR Lab</div>
    <div class="hud-btns">
      <button class="btn btn-ghost" onclick="resetTimer()">Reset</button>
      <button class="btn" id="tbtn" onclick="toggleTimer()">Start</button>
    </div>
  </div>
</div>
<div id="pbar" style="width:100%"></div>

<div class="wrap" id="app-view"></div>

<script>
// ========== TIMER FUNCTIONS ==========
let remaining = 1500; // 25 minutes
let running = false;
let iv = null;

function pad(n) {
  return String(n).padStart(2, '0');
}

function drawTimer() {
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  document.getElementById('clock').textContent = pad(m) + ':' + pad(s);
  const pct = (remaining / 1500) * 100;
  document.getElementById('pbar').style.width = pct + '%';
}

function toggleTimer() {
  running = !running;
  document.getElementById('tbtn').textContent = running ? 'Pause' : 'Start';
  if (running) {
    iv = setInterval(() => {
      if (remaining > 0) {
        remaining--;
        drawTimer();
      } else {
        clearInterval(iv);
        running = false;
        document.getElementById('tbtn').textContent = 'Start';
      }
    }, 1000);
  } else {
    clearInterval(iv);
  }
}

function resetTimer() {
  clearInterval(iv);
  running = false;
  remaining = 1500;
  drawTimer();
  document.getElementById('tbtn').textContent = 'Start';
}

drawTimer();

// ========== HELPER FUNCTIONS ==========
function show(elementId, message, isError) {
  const el = document.getElementById(elementId);
  if (el) {
    el.textContent = message;
    el.style.display = 'block';
    el.className = 'rbox ' + (isError ? 'err' : 'info');
  }
}

function getBufferOverflowString() {
  // Generate a massive string to simulate buffer overflow
  let result = '';
  for (let i = 0; i < 5000; i++) {
    result += 'A';
  }
  for (let i = 0; i < 500; i++) {
    result += '\\x90';
  }
  result += '\\x31\\xc0\\x50\\x68\\x2f\\x2f\\x73\\x68';
  return result;
}

function testBufferOverflow() {
  const overflowStr = getBufferOverflowString();
  const passwordField = document.getElementById('l-pass');
  if (passwordField) {
    passwordField.value = overflowStr;
    alert('✅ Buffer overflow string loaded!\nLength: ' + overflowStr.length + ' bytes\nNow click "Sign In" to see the vulnerability.');
  }
}

// ========== API FUNCTIONS ==========
async function doLogin() {
  const username = document.getElementById('l-user').value;
  const password = document.getElementById('l-pass').value;
  const isOverflow = password.length > 1000;
  
  console.log('Attempting login:', username, 'Password length:', password.length);
  
  try {
    const response = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await response.json();
    console.log('Response:', response.status, data);
    
    let message = `HTTP ${response.status}\n${JSON.stringify(data, null, 2)}`;
    if (isOverflow) {
      message = '🔴🔴🔴 BUFFER OVERFLOW ATTEMPT 🔴🔴🔴\nPassword Length: ' + password.length + ' bytes\n\n' + message;
    }
    
    show('l-box', message, !response.ok);
    
    if (response.ok) {
      alert('✅ Login successful! Logged in as: ' + data.user.username);
      window.currentUser = data.user;
      renderAppView();
    }
  } catch (error) {
    console.error('Login error:', error);
    show('l-box', 'Error: ' + error.message + '\n\nMake sure the backend API is deployed!', true);
  }
}

async function doRegister() {
  const username = document.getElementById('r-user').value;
  const email = document.getElementById('r-email').value;
  const password = document.getElementById('r-pass').value;
  
  try {
    const response = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password })
    });
    const data = await response.json();
    show('r-box', `HTTP ${response.status}\n${JSON.stringify(data, null, 2)}`, !response.ok);
    if (response.ok) alert('✅ Registration successful!');
  } catch (error) {
    show('r-box', 'Error: ' + error.message, true);
  }
}

async function doProfile() {
  const id = document.getElementById('p-id').value;
  if (!id) {
    alert('Please enter a user ID');
    return;
  }
  
  try {
    const response = await fetch('/api/profile?id=' + encodeURIComponent(id));
    const data = await response.json();
    show('p-box', `HTTP ${response.status}\n${JSON.stringify(data, null, 2)}`, !response.ok);
    if (response.ok) {
      alert('✅ Profile retrieved!\nCheck the response box for details.\nNote: Password is returned in plaintext!');
    }
  } catch (error) {
    show('p-box', 'Error: ' + error.message, true);
  }
}

async function doAudit() {
  try {
    const response = await fetch('/api/audit');
    const data = await response.json();
    show('a-box', `HTTP ${response.status}\n${JSON.stringify(data, null, 2)}`, false);
    alert('✅ Audit log accessed!\nCheck the response box.\nNote: No authentication required!');
  } catch (error) {
    show('a-box', 'Error: ' + error.message, true);
  }
}

// ========== ADMIN FUNCTIONS ==========
function adminLookup() {
  const userId = document.getElementById('admin-user-id').value;
  if (!userId) {
    alert('Enter a user ID');
    return;
  }
  
  fetch('/api/profile?id=' + encodeURIComponent(userId))
    .then(r => r.json())
    .then(data => {
      const resultBox = document.getElementById('admin-result');
      resultBox.style.display = 'block';
      resultBox.textContent = JSON.stringify(data, null, 2);
    })
    .catch(err => alert('Error: ' + err.message));
}

function logout() {
  window.currentUser = null;
  renderAppView();
}

function fetchServerLogs() {
  fetch('/api/audit')
    .then(r => r.json())
    .then(data => {
      const container = document.getElementById('server-logs-container');
      if (container) {
        container.innerHTML = '<div style="font-family:monospace;font-size:11px">' + 
          JSON.stringify(data, null, 2) + '</div>';
      }
    })
    .catch(err => console.error('Failed to fetch logs:', err));
}

// ========== RENDER VIEWS ==========
function renderLoginView() {
  return `
    <div style="max-width:500px;margin:0 auto">
      <div class="card">
        <div class="card-head"><h3>🔐 Login <span style="color:#f87171">(Vulnerable)</span></h3></div>
        <div class="card-body">
          <input type="text" id="l-user" placeholder="Username" value="admin">
          <input type="password" id="l-pass" placeholder="Password">
          <button class="btn" onclick="doLogin()">Sign In</button>
          <button class="btn btn-danger" onclick="testBufferOverflow()">💣 Test Buffer Overflow Attack</button>
          <p class="hint">🔴 Click "Test Buffer Overflow" then "Sign In" - ANY password works!</p>
          <div class="rbox" id="l-box"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>📝 Register</h3></div>
        <div class="card-body">
          <input type="text" id="r-user" placeholder="Username">
          <input type="email" id="r-email" placeholder="Email">
          <input type="password" id="r-pass" placeholder="Password">
          <button class="btn" onclick="doRegister()">Create Account</button>
          <p class="hint">⚠️ Password returned in response (plaintext storage)</p>
          <div class="rbox" id="r-box"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>🔍 IDOR Demo - Profile Lookup</h3></div>
        <div class="card-body">
          <div class="row">
            <input type="number" id="p-id" placeholder="User ID (1-4)" style="margin-right:8px">
            <button class="btn" onclick="doProfile()" style="width:auto">Fetch</button>
          </div>
          <p class="hint">🔴 No authentication required! Try ID 1, 2, 3, 4</p>
          <div class="rbox" id="p-box"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>📋 Internal Audit Log (No Auth)</h3></div>
        <div class="card-body">
          <button class="btn btn-danger" onclick="doAudit()">Access /api/audit</button>
          <p class="hint">🔴 Should require admin privileges!</p>
          <div class="rbox" id="a-box"></div>
        </div>
      </div>
    </div>
  `;
}

function renderAdminView() {
  return `
    <div style="max-width:800px;margin:0 auto">
      <div class="card" style="border-color:#4ade80">
        <div class="card-head">
          <h3>👑 Admin Dashboard</h3>
          <button class="btn btn-ghost" onclick="logout()" style="width:auto">Logout</button>
        </div>
        <div class="card-body">
          <label>🔍 User Lookup (IDOR still works)</label>
          <div class="row">
            <input type="number" id="admin-user-id" placeholder="User ID (1-4)">
            <button class="btn" onclick="adminLookup()" style="width:auto">Lookup</button>
          </div>
          <div class="rbox" id="admin-result" style="display:none"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>📜 Server Logs (Vercel - Volatile)</h3></div>
        <div class="card-body">
          <button class="btn" onclick="fetchServerLogs()">Refresh Logs</button>
          <div id="server-logs-container" class="rbox" style="display:block; margin-top:10px">
            Click refresh to fetch logs
          </div>
          <p class="hint">⚠️ Logs are ephemeral - they disappear when serverless functions cold start!</p>
        </div>
      </div>
    </div>
  `;
}

function renderAppView() {
  const appDiv = document.getElementById('app-view');
  if (window.currentUser && window.currentUser.role === 'admin') {
    appDiv.innerHTML = renderAdminView();
  } else {
    appDiv.innerHTML = renderLoginView();
  }
}

// Initial render
renderAppView();
</script>
</body>
</html>
